name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build
        run: npm run build

      - name: Run EFC_DEV tests (headless)
        run: node test/ci-tests.mjs
        env:
          PW_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
